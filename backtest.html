<script>
// ─────────────────────────────────────────────
// MATH HELPERS (ported from options-bot/index.ts)
// ─────────────────────────────────────────────

function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const ema = new Array(data.length).fill(0);
  ema[0] = data[0];
  for (let i = 1; i < data.length; i++) ema[i] = data[i] * k + ema[i-1] * (1-k);
  return ema;
}

function calcATR(highs, lows, closes, period) {
  const tr = highs.map((h, i) => i === 0 ? h - lows[i] : Math.max(h - lows[i], Math.abs(h - closes[i-1]), Math.abs(lows[i] - closes[i-1])));
  const atr = new Array(tr.length).fill(0);
  atr[period-1] = tr.slice(0, period).reduce((a,b) => a+b) / period;
  for (let i = period; i < tr.length; i++) atr[i] = (atr[i-1] * (period-1) + tr[i]) / period;
  return atr;
}

function calcSuperTrend(highs, lows, closes, atrLen, mult) {
  const atr = calcATR(highs, lows, closes, atrLen);
  const n = closes.length;
  const trend = new Array(n).fill(1);
  const upperBand = new Array(n).fill(0);
  const lowerBand = new Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    const hl2 = (highs[i] + lows[i]) / 2;
    upperBand[i] = hl2 + mult * atr[i];
    lowerBand[i] = hl2 - mult * atr[i];
    if (i > 0) {
      lowerBand[i] = lowerBand[i] > lowerBand[i-1] || closes[i-1] < lowerBand[i-1] ? lowerBand[i] : lowerBand[i-1];
      upperBand[i] = upperBand[i] < upperBand[i-1] || closes[i-1] > upperBand[i-1] ? upperBand[i] : upperBand[i-1];
      if (trend[i-1] === -1 && closes[i] > upperBand[i-1]) trend[i] = 1;
      else if (trend[i-1] === 1 && closes[i] < lowerBand[i-1]) trend[i] = -1;
      else trend[i] = trend[i-1];
    }
  }
  return { trend, upperBand, lowerBand };
}

function calcRSI(closes, period) {
  const rsi = new Array(closes.length).fill(NaN);
  if (closes.length < period + 1) return rsi;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period, avgLoss = losses / period;
  rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    const g = diff > 0 ? diff : 0, l = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period-1) + g) / period;
    avgLoss = (avgLoss * (period-1) + l) / period;
    rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return rsi;
}

function calcMACD(closes, fast, slow, signal) {
  const emaFast = calcEMA(closes, fast);
  const emaSlow = calcEMA(closes, slow);
  const macdLine = closes.map((_, i) => emaFast[i] - emaSlow[i]);
  const validStart = macdLine.findIndex(v => !isNaN(v));
  const signalLine = new Array(closes.length).fill(NaN);
  if (validStart >= 0) {
    const emaSignal = calcEMA(macdLine.slice(validStart), signal);
    for (let i = 0; i < emaSignal.length; i++) signalLine[validStart + i] = emaSignal[i];
  }
  const hist = macdLine.map((v, i) => (isNaN(v) || isNaN(signalLine[i])) ? NaN : v - signalLine[i]);
  return { macdLine, signalLine, hist };
}

// ─────────────────────────────────────────────
// SIGNAL GENERATORS
// ─────────────────────────────────────────────

function computeBoof10Signals(candles) {
  const highs  = candles.map(c => c.high);
  const lows   = candles.map(c => c.low);
  const closes = candles.map(c => c.close);
  const n = closes.length;
  const out = new Array(n).fill(0);
  const { trend } = calcSuperTrend(highs, lows, closes, 10, 3.0);
  for (let i = 1; i < n; i++) {
    if (trend[i] !== trend[i-1]) out[i] = trend[i] === 1 ? 1 : -1;
  }
  return out;
}

function generateSignalSuperTrend(candles, settings = {}) {
  const closes = candles.map(c => c.close);
  const n = closes.length;
  const sigs = computeBoof10Signals(candles);
  const ci = n - 2;
  const s = sigs[ci];
  const signal = s === 1 ? 'buy' : s === -1 ? 'sell' : 'none';
  return { signal, price: closes[ci] };
}

function calcDMI(highs, lows, closes, period) {
  const n = highs.length;
  const plusDM  = new Array(n).fill(0);
  const minusDM = new Array(n).fill(0);
  for (let i = 1; i < n; i++) {
    const up = highs[i] - highs[i-1], down = lows[i-1] - lows[i];
    if (up > down && up > 0) plusDM[i] = up;
    if (down > up && down > 0) minusDM[i] = down;
  }
  const atr = calcATR(highs, lows, closes, period);
  const smoothP = calcEMA(plusDM, period), smoothM = calcEMA(minusDM, period);
  const plusDI  = smoothP.map((v,i) => atr[i] ? (v/atr[i])*100 : 0);
  const minusDI = smoothM.map((v,i) => atr[i] ? (v/atr[i])*100 : 0);
  const dx = plusDI.map((v,i) => (v+minusDI[i]) ? Math.abs(v-minusDI[i])/(v+minusDI[i])*100 : 0);
  const adx = new Array(n).fill(0);
  const start2 = period * 2 - 1;
  if (start2 < n) {
    adx[start2] = dx.slice(period-1, start2).reduce((a,b)=>a+b,0) / period;
    for (let i = start2+1; i < n; i++) adx[i] = (adx[i-1]*(period-1)+dx[i])/period;
  }
  return { plusDI, minusDI, adx };
}

function generateSignalBoof20(candles, direction = 'both', thresholdBuy = 0.003, thresholdSell = -0.003) {
  const highs  = candles.map(c => c.high);
  const lows   = candles.map(c => c.low);
  const closes = candles.map(c => c.close);
  const n = closes.length;
  if (n < 25) return { signal: 'none', price: closes[n-1] };
  const length = 14, maFast = 5, maSlow = 20;
  const pastReturn = new Array(n).fill(0);
  for (let i = length; i < n; i++) pastReturn[i] = (closes[i] - closes[i-length]) / closes[i-length];
  const maFastVals = new Array(n).fill(NaN), maSlowVals = new Array(n).fill(NaN);
  for (let i = maFast-1; i < n; i++) maFastVals[i] = closes.slice(i-maFast+1,i+1).reduce((a,b)=>a+b,0)/maFast;
  for (let i = maSlow-1; i < n; i++) maSlowVals[i] = closes.slice(i-maSlow+1,i+1).reduce((a,b)=>a+b,0)/maSlow;
  const rsi = calcRSI(closes, length);
  const i = n - 2, iPrev = i - 1;
  const calcPredicted = (idx) => {
    const rP = pastReturn[idx] || 0;
    const rM = (maFastVals[idx] - maSlowVals[idx]) / closes[idx] || 0;
    const rR = (rsi[idx] - 50) / 50 || 0;
    const atrSlice = highs.slice(idx-13, idx+1).map((h,j) => h - lows[idx-13+j]);
    const rA = Math.max(...atrSlice) / closes[idx] || 0;
    return 0.4*rP + 0.3*rM + 0.2*rR - 0.1*rA;
  };
  const predictedReturn = calcPredicted(i);
  const prevPredicted  = iPrev >= 13 ? calcPredicted(iPrev) : 0;
  const curState  = predictedReturn > thresholdBuy ? 1 : predictedReturn < thresholdSell ? -1 : 0;
  const prevState = prevPredicted  > thresholdBuy ? 1 : prevPredicted  < thresholdSell ? -1 : 0;
  const justFlipped = curState !== prevState;
  let signal = 'none';
  if (curState === 1 && justFlipped) signal = 'buy';
  else if (curState === -1 && justFlipped) signal = 'sell';
  if (direction === 'long'  && signal === 'sell') signal = 'none';
  if (direction === 'short' && signal === 'buy')  signal = 'none';
  return { signal, price: closes[i] };
}

function generateSignalRSIMACD(candles, direction = 'both') {
  const closes = candles.map(c => c.close);
  const n = closes.length;
  const i = n - 2;
  const rsi   = calcRSI(closes, 14);
  const ema50 = calcEMA(closes, 50);
  const { hist } = calcMACD(closes, 12, 26, 9);
  let inLong = false, inShort = false;
  for (let j = 50; j < i; j++) {
    const r = rsi[j], h = hist[j], e = ema50[j], c = closes[j];
    if (isNaN(r)||isNaN(h)||isNaN(e)) continue;
    const buyCond  = (r < 30 || h > 0) && c > e;
    const sellCond = (r > 70 || h < 0) && c < e;
    if (!inLong && !inShort && buyCond) inLong = true;
    else if (!inLong && !inShort && sellCond) inShort = true;
    else if (inLong  && sellCond) { inLong = false; inShort = true; }
    else if (inShort && buyCond)  { inShort = false; inLong = true; }
  }
  const curRSI = rsi[i], curEma = ema50[i], curHist = hist[i], curClose = closes[i];
  const buyCond  = (curRSI < 30 || curHist > 0) && curClose > curEma;
  const sellCond = (curRSI > 70 || curHist < 0) && curClose < curEma;
  let signal = 'none';
  if (buyCond  && (inShort || !inLong))  signal = 'buy';
  if (sellCond && (inLong  || (!inShort && direction !== 'long'))) signal = 'sell';
  if (direction === 'long'  && signal === 'sell') signal = 'none';
  if (direction === 'short' && signal === 'buy')  signal = 'none';
  return { signal, price: curClose };
}

// Boof 3.0: rolling k-means — only uses past data at each bar (no look-ahead bias)
function kMeans3(features, dims, maxIter=30) {
  const k=3, n=features.length;
  if (n < k) return new Array(n).fill(0);
  const centroids = features.slice(0,k).map(f=>[...f]);
  let clusters = new Array(n).fill(0);
  for (let iter=0;iter<maxIter;iter++) {
    let changed=false;
    for (let i=0;i<n;i++) {
      let best=0,bestDist=Infinity;
      for (let j=0;j<k;j++) { let d=0; for(let d2=0;d2<dims;d2++) d+=(features[i][d2]-centroids[j][d2])**2; if(d<bestDist){bestDist=d;best=j;} }
      if(clusters[i]!==best){clusters[i]=best;changed=true;}
    }
    if(!changed) break;
    const nc=Array(k).fill(null).map(()=>Array(dims).fill(0)),counts=Array(k).fill(0);
    for(let i=0;i<n;i++){counts[clusters[i]]++;for(let d2=0;d2<dims;d2++)nc[clusters[i]][d2]+=features[i][d2];}
    for(let j=0;j<k;j++){if(counts[j]>0)for(let d2=0;d2<dims;d2++)centroids[j][d2]=nc[j][d2]/counts[j];}
  }
  return clusters;
}

function computeBoof20Signals(candles, direction='both', thresholdBuy=0.003, thresholdSell=-0.003) {
  const highs  = candles.map(c => c.high);
  const lows   = candles.map(c => c.low);
  const closes = candles.map(c => c.close);
  const n = closes.length;
  const out = new Array(n).fill(0);
  if (n < 25) return out;
  const length=14, maFast=5, maSlow=20;
  const pastReturn=new Array(n).fill(0);
  for(let i=length;i<n;i++) pastReturn[i]=(closes[i]-closes[i-length])/closes[i-length];
  const maFastV=new Array(n).fill(NaN),maSlowV=new Array(n).fill(NaN);
  for(let i=maFast-1;i<n;i++) maFastV[i]=closes.slice(i-maFast+1,i+1).reduce((a,b)=>a+b,0)/maFast;
  for(let i=maSlow-1;i<n;i++) maSlowV[i]=closes.slice(i-maSlow+1,i+1).reduce((a,b)=>a+b,0)/maSlow;
  const rsi=calcRSI(closes,length);
  for(let i=length+1;i<n;i++) {
    const rP=pastReturn[i]||0;
    const rM=(maFastV[i]-maSlowV[i])/closes[i]||0;
    const rR=(rsi[i]-50)/50||0;
    const atrSlice=highs.slice(i-13,i+1).map((h,j)=>h-lows[i-13+j]);
    const rA=Math.max(...atrSlice)/closes[i]||0;
    const pred=0.4*rP+0.3*rM+0.2*rR-0.1*rA;
    const prevPred=(()=>{
      const j=i-1;
      const rP2=pastReturn[j]||0,rM2=(maFastV[j]-maSlowV[j])/closes[j]||0,rR2=(rsi[j]-50)/50||0;
      const aS2=highs.slice(j-13,j+1).map((h,k)=>h-lows[j-13+k]);
      const rA2=Math.max(...aS2)/closes[j]||0;
      return 0.4*rP2+0.3*rM2+0.2*rR2-0.1*rA2;
    })();
    const cur=pred>thresholdBuy?1:pred<thresholdSell?-1:0;
    const prev=prevPred>thresholdBuy?1:prevPred<thresholdSell?-1:0;
    if(cur!==prev) { if(cur===1)out[i]=1; else if(cur===-1)out[i]=-1; }
  }
  return out;
}

function computeBoof30Signals(candles) {
  const closes  = candles.map(c => c.close);
  const volumes = candles.map(c => c.volume || 1000000);
  const n = closes.length;
  const out = new Array(n).fill(0);
  if (n < 50) return out;

  const lookback = 14;
  const WINDOW = 100; // only use past 100 bars for clustering — no look-ahead

  const returns = new Array(n).fill(0);
  for (let i=1;i<n;i++) returns[i]=(closes[i]-closes[i-1])/closes[i-1];

  const returnStd = new Array(n).fill(0);
  for (let i=lookback;i<n;i++) {
    const sl=returns.slice(i-lookback+1,i+1),mean=sl.reduce((a,b)=>a+b,0)/lookback;
    returnStd[i]=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/lookback);
  }
  const maFast=new Array(n).fill(NaN),maSlow=new Array(n).fill(NaN);
  for(let i=4;i<n;i++) maFast[i]=closes.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5;
  for(let i=19;i<n;i++) maSlow[i]=closes.slice(i-19,i+1).reduce((a,b)=>a+b,0)/20;
  const maSlope=maFast.map((f,i)=>!isNaN(f)&&!isNaN(maSlow[i])?f-maSlow[i]:0);
  const rsi=calcRSI(closes,lookback);
  const volumeStd=new Array(n).fill(0);
  for(let i=lookback;i<n;i++) {
    const sl=volumes.slice(i-lookback+1,i+1),mean=sl.reduce((a,b)=>a+b,0)/lookback;
    volumeStd[i]=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/lookback);
  }

  const validStart = Math.max(lookback, 20);

  // At each bar, cluster only the past WINDOW bars (rolling — no future data)
  for (let ci = validStart + WINDOW; ci < n; ci++) {
    const winStart = ci - WINDOW;
    const winIndices = [];
    const winFeatures = [];
    for (let j = winStart; j <= ci; j++) {
      if (!isNaN(rsi[j])) { winFeatures.push([returnStd[j]*100, maSlope[j], rsi[j], volumeStd[j]/1000000]); winIndices.push(j); }
    }
    if (winFeatures.length < 10) continue;

    const clusters = kMeans3(winFeatures, 4);

    // Map clusters to regimes by avg slope
    const cs = Array.from({length:3},(_,c)=>{
      const idxs=winIndices.filter((_,i)=>clusters[i]===c);
      return {cluster:c, avgSlope:idxs.reduce((a,i)=>a+maSlope[i],0)/(idxs.length||1)};
    }).sort((a,b)=>a.avgSlope-b.avgSlope);
    const rm={[cs[0].cluster]:'Range',[cs[1].cluster]:'HighVol',[cs[2].cluster]:'Trend'};

    // Only assign signal to the current bar (last in window)
    const localIdx = winIndices.indexOf(ci);
    if (localIdx < 0) continue;
    const regime = rm[clusters[localIdx]];
    if (regime==='Trend')   { if(maSlope[ci]>0&&rsi[ci]>50)out[ci]=1; else if(maSlope[ci]<0&&rsi[ci]<50)out[ci]=-1; }
    if (regime==='Range')   { if(rsi[ci]<40)out[ci]=1; else if(rsi[ci]>60)out[ci]=-1; }
    if (regime==='HighVol') { if(rsi[ci]<40&&maSlope[ci]>0)out[ci]=1; else if(rsi[ci]>60&&maSlope[ci]<0)out[ci]=-1; }
  }
  return out;
}

function generateSignalBoof30(candles, direction = 'both') {
  const closes = candles.map(c => c.close);
  const n = closes.length;
  if (n < 35) return { signal: 'none', price: closes[n-1] };
  const sigs = computeBoof30Signals(candles);
  const ci = n - 2;
  const cur = sigs[ci] ?? 0, prev = sigs[ci-1] ?? 0;
  let signal = 'none';
  if (cur !== prev) { if (cur===1) signal='buy'; else if (cur===-1) signal='sell'; }
  if (direction==='long'  && signal==='sell') signal='none';
  if (direction==='short' && signal==='buy')  signal='none';
  return { signal, price: closes[ci] };
}

// ─────────────────────────────────────────────
// BACKTEST ENGINE
// ─────────────────────────────────────────────

function runBacktestOnCandles(candles, genFn, direction) {
  const trades = [];
  let openTrade = null;

  for (let i = 20; i < candles.length - 1; i++) {
    const slice = candles.slice(0, i + 1);
    const { signal, price } = genFn(slice, direction, i);

    // Close existing trade on opposite signal (always allowed regardless of direction)
    if (signal === 'sell' && openTrade && openTrade.action === 'buy') {
      const pnl = price - openTrade.entry;
      trades.push({ ...openTrade, exit: price, exitIdx: i, exitTime: candles[i].time, pnl, pct: (pnl/openTrade.entry)*100, win: pnl > 0 });
      openTrade = null;
    } else if (signal === 'buy' && openTrade && openTrade.action === 'sell') {
      const pnl = openTrade.entry - price;
      trades.push({ ...openTrade, exit: price, exitIdx: i, exitTime: candles[i].time, pnl, pct: (pnl/openTrade.entry)*100, win: pnl > 0 });
      openTrade = null;
    }
    // Enter new trade only if direction allows and no open position
    if (!openTrade) {
      if (signal === 'buy'  && direction !== 'short') openTrade = { entry: price, entryIdx: i, entryTime: candles[i].time, action: 'buy' };
      if (signal === 'sell' && direction !== 'long')  openTrade = { entry: price, entryIdx: i, entryTime: candles[i].time, action: 'sell' };
    }
  }

  const wins   = trades.filter(t => t.win);
  const losses = trades.filter(t => !t.win);
  const totalPnl = trades.reduce((s,t) => s+t.pnl, 0);
  const avgWin  = wins.length   ? wins.reduce((s,t)=>s+t.pnl,0)/wins.length   : 0;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+t.pnl,0)/losses.length : 0;
  const winRate = trades.length ? (wins.length / trades.length) * 100 : 0;
  const profitFactor = losses.length && Math.abs(losses.reduce((s,t)=>s+t.pnl,0)) > 0
    ? Math.abs(wins.reduce((s,t)=>s+t.pnl,0)) / Math.abs(losses.reduce((s,t)=>s+t.pnl,0))
    : wins.length ? Infinity : 0;

  return { trades, wins: wins.length, losses: losses.length, totalPnl, avgWin, avgLoss, winRate, profitFactor };
}

async function fetchCandles(symbol, interval, count) {
  const url = `${SUPABASE_URL}/functions/v1/get-candles?symbol=${encodeURIComponent(symbol)}&interval=${interval}&count=${count}`;
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error(`get-candles returned ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  if (!json.candles || json.candles.length === 0) throw new Error('No candle data returned for ' + symbol);
  return json.candles;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
}

function fmtPct(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function fmtPrice(v) { return '$' + v.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:4 }); }

function renderSystemCard(name, badgeClass, result, symbol) {
  const { trades, wins, losses, totalPnl, avgWin, avgLoss, winRate, profitFactor } = result;
  const pnlClass  = totalPnl >= 0 ? 'pos' : 'neg';
  const winClass  = winRate  >= 50 ? 'pos' : 'neg';
  const pfClass   = profitFactor >= 1 ? 'pos' : 'neg';

  const tradeRows = trades.length === 0
    ? '<tr><td colspan="7" class="no-trades">No completed trades found in this data range.</td></tr>'
    : trades.map(t => {
        const sellHigher = t.action === 'buy' ? t.exit > t.entry : t.entry > t.exit;
        return `<tr class="${t.win ? 'win' : 'loss'}">
          <td><span class="badge-${t.action}">${t.action.toUpperCase()}</span></td>
          <td>${fmtTime(t.entryTime)}</td>
          <td>${fmtPrice(t.entry)}</td>
          <td>${fmtTime(t.exitTime)}</td>
          <td>${fmtPrice(t.exit)}</td>
          <td class="${t.win ? 'pnl-pos' : 'pnl-neg'}">${fmtPct(t.pct)}</td>
          <td style="font-size:0.75rem;">${sellHigher ? '<span style="color:#00e676;">✓ Yes</span>' : '<span style="color:#ff5252;">✗ No</span>'}</td>
        </tr>`;
      }).join('');

  const aboveCount = trades.filter(t => t.action === 'buy' ? t.exit > t.entry : t.entry > t.exit).length;
  const abovePct   = trades.length ? ((aboveCount / trades.length) * 100).toFixed(0) : 0;

  return `<div class="system-card">
    <div class="system-card-header">
      <span class="system-name">${name}</span>
      <span class="system-badge ${badgeClass}">${symbol.toUpperCase()}</span>
      <span class="system-badge" style="background:rgba(255,255,255,0.06);color:#666;margin-left:auto;">${trades.length} trades</span>
    </div>
    <div class="system-stats">
      <div class="stat-box">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value ${winClass}">${winRate.toFixed(0)}%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Exit Higher %</div>
        <div class="stat-value ${aboveCount/Math.max(trades.length,1) >= 0.5 ? 'pos':'neg'}">${abovePct}%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Profit Factor</div>
        <div class="stat-value ${pfClass}">${isFinite(profitFactor) ? profitFactor.toFixed(2) : '∞'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Total P&L (pts)</div>
        <div class="stat-value ${pnlClass}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg Win</div>
        <div class="stat-value pos">+${avgWin.toFixed(2)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg Loss</div>
        <div class="stat-value neg">${avgLoss.toFixed(2)}</div>
      </div>
    </div>
    <div class="section-label">Trade Log</div>
    <div class="trades-table-wrap">
      <table class="trades-table">
        <thead><tr>
          <th>Side</th><th>Entry Time</th><th>Entry</th><th>Exit Time</th><th>Exit</th><th>P&L %</th><th>Exit Higher?</th>
        </tr></thead>
        <tbody>${tradeRows}</tbody>
      </table>
    </div>
  </div>`;
}

async function runBacktest() {
  const symbol    = document.getElementById('bt-symbol').value.trim().toUpperCase();
  const interval  = document.getElementById('bt-interval').value;
  const count     = parseInt(document.getElementById('bt-candles').value);
  const systems   = document.getElementById('bt-systems').value;
  const direction = document.getElementById('bt-direction').value;

  if (!symbol) { alert('Enter a symbol'); return; }

  const btn = document.getElementById('run-btn');
  const errEl = document.getElementById('error-container');
  const resEl = document.getElementById('results-container');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';
  errEl.innerHTML = '';
  resEl.innerHTML = `<div class="loading"><span class="spinner"></span>Fetching ${count} candles for ${symbol} (${interval})…</div>`;

  try {
    const candles = await fetchCandles(symbol, interval, count);
    if (candles.length < 30) throw new Error(`Only ${candles.length} candles returned — try a longer range or different interval.`);

    resEl.innerHTML = `<div class="loading"><span class="spinner"></span>Running signal backtests on ${candles.length} candles…</div>`;

    // Pre-compute all signal arrays once — no look-ahead bias, no re-computation per slice
    const boof10Signals = computeBoof10Signals(candles);
    const boof20Signals = computeBoof20Signals(candles, direction);
    const boof30Signals = computeBoof30Signals(candles);

    function makePrecomputedFn(sigArr) {
      return (c, d, i) => {
        const s = sigArr[i] ?? 0;
        const sig = s===1 ? 'buy' : s===-1 ? 'sell' : 'none';
        return { signal: sig, price: c[c.length-1].close };
      };
    }

    const systemDefs = [
      { key: 'supertrend', name: 'Boof 1.0', badge: 'badge-st',  fn: makePrecomputedFn(boof10Signals) },
      { key: 'boof20',     name: 'Boof 2.0', badge: 'badge-b20', fn: makePrecomputedFn(boof20Signals) },
      { key: 'boof30',     name: 'Boof 3.0', badge: 'badge-b30', fn: makePrecomputedFn(boof30Signals) },
    ];

    const toRun = systems === 'all' ? systemDefs : systemDefs.filter(s => s.key === systems);

    // Run all (slight delay to let UI update)
    await new Promise(r => setTimeout(r, 50));

    const cards = toRun.map(sys => {
      const result = runBacktestOnCandles(candles, sys.fn, direction);
      return renderSystemCard(sys.name, sys.badge, result, symbol);
    });

    resEl.innerHTML = `
      <div style="margin-bottom:12px;font-size:0.8rem;color:#555;">
        ${candles.length} candles · ${symbol} · ${interval} · ${direction === 'both' ? 'Long & Short' : direction === 'long' ? 'Long Only' : 'Short Only'}
        · from ${fmtTime(candles[0].time)} to ${fmtTime(candles[candles.length-1].time)}
      </div>
      <div class="results-grid">${cards.join('')}</div>`;

  } catch (err) {
    errEl.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
    resEl.innerHTML = '<div class="empty-state">Backtest failed. Check the symbol and try again.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Run Backtest';
  }
}
